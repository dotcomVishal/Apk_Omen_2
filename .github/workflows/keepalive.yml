name: Keep API Alive

on:
  schedule:
    # Runs every 12 hours at minute 0
    - cron: '0 */12 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health Endpoint
        # REPLACE THIS URL with your actual Hugging Face Direct URL
        run: curl -s https://iamrabbit-apk-omen-2.hf.space/health
